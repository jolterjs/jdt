name: Feature request
description: Suggest an improvement or new capability for JDT.
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what makes it hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or API you would like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other designs have you considered?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Plugin API
        - WIT/component build
        - Manifest validation
        - Examples
        - Documentation
        - Other
    validations:
      required: true
