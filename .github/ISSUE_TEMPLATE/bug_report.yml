name: Bug report
description: Report something that is broken in JDT.
title: "Bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve JDT. Please include enough detail for us to reproduce the issue.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the unexpected behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: Describe the behavior you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include commands, files, or a minimal repository if possible.
      placeholder: |
        1. Run ...
        2. See ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      render: shell
  - type: input
    id: jdt-version
    attributes:
      label: JDT version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: bun-version
    attributes:
      label: Bun version
      placeholder: "bun --version"
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "node --version"
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
